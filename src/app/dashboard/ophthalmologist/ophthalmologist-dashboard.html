<div class="dashboard-layout" [class.sidebar-collapsed]="sidebarCollapsed">
  <app-dashboard-sidebar
    [collapsed]="sidebarCollapsed"
    (toggleSidebar)="toggleSidebar()">
  </app-dashboard-sidebar>

  <div class="dashboard-main">
    <app-dashboard-navbar></app-dashboard-navbar>

    <div class="dashboard-content">

      <!-- Breadcrumb -->
      <div class="breadcrumb">
        <span>Home</span>
        <span class="sep">›</span>
        <span class="current">Dashboard</span>
      </div>

      <!-- Profile + Stats Banner -->
      <div class="profile-banner">
        <div class="profile-left">
          <div class="doctor-avatar">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" width="32" height="32">
              <path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/>
              <circle cx="12" cy="7" r="4"/>
            </svg>
          </div>
          <div>
            <h3 class="doctor-name">Dr. Sarah Ahmed</h3>
            <span class="doctor-role">Ophthalmologist</span>
          </div>
        </div>
        <div class="profile-stats">
          <div class="stat-item">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" width="20">
              <path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/>
              <circle cx="9" cy="7" r="4"/>
              <path d="M23 21v-2a4 4 0 00-3-3.87"/>
              <path d="M16 3.13a4 4 0 010 7.75"/>
            </svg>
            <div>
              <span class="stat-val">1,000</span>
              <span class="stat-lbl">Patients</span>
            </div>
          </div>
          <div class="stat-divider"></div>
          <div class="stat-item">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" width="20">
              <circle cx="12" cy="12" r="10"/>
              <path d="M12 8v4l3 3"/>
            </svg>
            <div>
              <span class="stat-val">158</span>
              <span class="stat-lbl">Analyses</span>
            </div>
          </div>
          <div class="stat-divider"></div>
          <div class="stat-item">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" width="20">
              <polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/>
            </svg>
            <div>
              <span class="stat-val">4.8</span>
              <span class="stat-lbl">Rating</span>
            </div>
          </div>
        </div>
      </div>

      <!-- Quick Action Cards -->
      <div class="quick-actions">
        <div class="action-card">
          <div class="action-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18">
              <path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/>
              <circle cx="9" cy="7" r="4"/>
            </svg>
          </div>
          <span>Patient Consultation</span>
        </div>
        <div class="action-card">
          <div class="action-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18">
              <rect x="3" y="4" width="18" height="18" rx="2" ry="2"/>
              <line x1="16" y1="2" x2="16" y2="6"/>
              <line x1="8" y1="2" x2="8" y2="6"/>
              <line x1="3" y1="10" x2="21" y2="10"/>
            </svg>
          </div>
          <span>Follow-up Review</span>
        </div>
        <div class="action-card">
          <div class="action-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18">
              <path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/>
              <circle cx="9" cy="7" r="4"/>
              <path d="M23 21v-2a4 4 0 00-3-3.87"/>
              <path d="M16 3.13a4 4 0 010 7.75"/>
            </svg>
          </div>
          <span>Team Meeting</span>
        </div>
      </div>

      <!-- Charts -->
      <app-dashboard-charts></app-dashboard-charts>

      <!-- Table -->
      <app-dashboard-table></app-dashboard-table>

      <!-- Bottom Row 1 -->
      <div class="bottom-row">
        <app-doctor-availability></app-doctor-availability>
        <app-recent-activity></app-recent-activity>
      </div>

      <!-- Bottom Row 2 -->
      <div class="bottom-row">
        <app-image-analysis></app-image-analysis>
        <app-performance-metrics></app-performance-metrics>
      </div>

    </div>
  </div>
</div>
