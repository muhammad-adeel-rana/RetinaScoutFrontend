<div class="metrics-col">

  <!-- Performance Metrics -->
  <div class="card">
    <div class="card-header">
      <h3 class="card-title">Performance Metrics</h3>
      <button class="export-btn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="12">
          <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/>
          <polyline points="7 10 12 15 17 10"/>
          <line x1="12" y1="15" x2="12" y2="3"/>
        </svg>
        Export
      </button>
    </div>
    <div class="metrics-grid">
      <div class="metric-item">
        <span class="metric-val">500 <span class="metric-badge green">2.0%↑</span></span>
        <span class="metric-lbl">Total Leads</span>
      </div>
      <div class="metric-item">
        <span class="metric-val">15% <span class="metric-badge green">0.8%↑</span></span>
        <span class="metric-lbl">Conversion Rate</span>
      </div>
      <div class="metric-item">
        <span class="metric-val">UGX. 50M <span class="metric-badge green">2.0%↑</span></span>
        <span class="metric-lbl">Revenue Generated</span>
      </div>
      <div class="metric-item">
        <span class="metric-val">300% <span class="metric-badge green">1.26%↑</span></span>
        <span class="metric-lbl">ROI</span>
      </div>
    </div>
  </div>

  <!-- Website Analytics -->
  <div class="card">
    <h3 class="card-title">Website Analytics</h3>
    <div class="analytics-row">
      <div class="analytic-item">
        <span class="analytic-val">5000</span>
        <span class="analytic-lbl">Visits</span>
      </div>
      <div class="analytic-item">
        <span class="analytic-val">500</span>
        <span class="analytic-lbl">Conversions</span>
      </div>
    </div>
  </div>

  <!-- Quick Actions -->
  <div class="card">
    <h3 class="card-title">Quick Actions</h3>
    <div class="quick-btns">
      <button class="quick-btn quick-btn--blue">New Consultation</button>
      <button class="quick-btn quick-btn--blue">Upload Images</button>
      <button class="quick-btn quick-btn--blue">View Analysis</button>
      <button class="quick-btn quick-btn--outline">Generate Report</button>
      <button class="quick-btn quick-btn--outline">Share Results</button>
    </div>
  </div>

</div>
