<div class="charts-row">

  <!-- Bar Chart -->
  <div class="chart-card">
    <div class="chart-header">
      <span class="chart-title">Total Uploads</span>
      <div class="chart-filter">
        Last 2 weeks
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="12"><polyline points="6 9 12 15 18 9"/></svg>
      </div>
    </div>

    <div class="bar-chart">
      <div class="bar-y-axis">
        <span>80</span><span>60</span><span>40</span><span>20</span><span>0</span>
      </div>
      <div class="bars-container">
        @for (bar of barData; track $index) {
          <div class="bar-col">
            <div class="bar-wrap">
              @if (bar.highlight) {
                <div class="bar-tooltip">
                  <span>Today</span>
                  <strong>80 patients</strong>
                </div>
              }
              <div class="bar"
                [style.height]="getBarHeight(bar.value)"
                [class.bar--highlight]="bar.highlight">
              </div>
            </div>
            <span class="bar-label">{{ bar.day }}</span>
          </div>
        }
      </div>
    </div>
  </div>

  <!-- Pie Chart -->
  <div class="chart-card">
    <div class="chart-header">
      <span class="chart-title">Patient Segmentation</span>
      <button class="more-btn">
        <svg viewBox="0 0 24 24" fill="currentColor" width="14"><circle cx="5" cy="12" r="2"/><circle cx="12" cy="12" r="2"/><circle cx="19" cy="12" r="2"/></svg>
      </button>
    </div>

    <div class="donut-wrap">
      <svg viewBox="0 0 120 120" class="donut-svg">
        <!-- Active 60% -->
        <circle cx="60" cy="60" r="45" fill="none" stroke="#10B981" stroke-width="22"
          stroke-dasharray="169.6 113.1" stroke-dashoffset="0" transform="rotate(-90 60 60)"/>
        <!-- Pending 30% -->
        <circle cx="60" cy="60" r="45" fill="none" stroke="#F59E0B" stroke-width="22"
          stroke-dasharray="84.8 197.9" stroke-dashoffset="-169.6" transform="rotate(-90 60 60)"/>
        <!-- Complete 10% -->
        <circle cx="60" cy="60" r="45" fill="none" stroke="#7C3AED" stroke-width="22"
          stroke-dasharray="28.3 254.4" stroke-dashoffset="-254.4" transform="rotate(-90 60 60)"/>
        <text x="60" y="56" text-anchor="middle" font-size="10" fill="#64748B">Active</text>
        <text x="60" y="68" text-anchor="middle" font-size="12" font-weight="700" fill="#1E2A3A">60%</text>
      </svg>

      <div class="donut-legend">
        @for (seg of donutSegments; track seg.label) {
          <div class="legend-item">
            <span class="legend-dot" [style.background]="seg.color"></span>
            <span class="legend-label">{{ seg.label }}</span>
            <span class="legend-val">{{ seg.value }}%</span>
          </div>
        }
      </div>
    </div>
  </div>

</div>
