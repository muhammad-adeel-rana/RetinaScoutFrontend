<section class="contact-section section-padding">
  <div class="container contact-grid">

    <!-- Left: Form -->
    <div class="contact-form-wrap">
      <span class="label-tag">CONTACT US</span>
      <h2 class="section-heading">Let Your Wanderlust Guide You</h2>

      <form class="contact-form">
        <div class="form-row">
          <div class="form-group">
            <label>First Name</label>
            <input type="text" placeholder="First Name" />
          </div>
          <div class="form-group">
            <label>Last Name</label>
            <input type="text" placeholder="Last Name" />
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>Your Email</label>
            <input type="email" placeholder="Your Email" />
          </div>
          <div class="form-group">
            <label>Phone</label>
            <input type="tel" placeholder="+1 (555) 000-0000" />
          </div>
        </div>
        <div class="form-group full">
          <label>Message</label>
          <textarea placeholder="Write your message..." rows="4"></textarea>
        </div>
        <button type="submit" class="btn btn-primary submit-btn">Send Message</button>
      </form>
    </div>

    <!-- Right: Image -->
    <div class="contact-image">
      <img src="Doctor-Meeting.png" alt="Medical consultation" class="contact-img" />
    </div>

  </div>
</section>
