<div class="auth-form-wrap">

  <h1 class="auth-title">Sign Up</h1>
  <p class="auth-subtitle">Sign up to join</p>

  <!-- Social buttons -->
  <div class="social-btns">
    <button class="social-btn social-btn--google">
      <svg viewBox="0 0 24 24" width="18" height="18"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
      Sign up with Google
    </button>
    <button class="social-btn social-btn--facebook">
      <svg viewBox="0 0 24 24" width="18" height="18" fill="#fff"><path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/></svg>
      Sign up with Facebook
    </button>
  </div>

  <!-- Divider -->
  <div class="auth-divider">
    <span class="divider-line"></span>
    <span class="divider-text">or sign up with</span>
    <span class="divider-line"></span>
  </div>

  <!-- Form -->
  <form class="auth-form" (ngSubmit)="null">

    <div class="form-group">
      <label>Designation</label>
      <div class="select-wrap">
        <select [(ngModel)]="form.designation" name="designation">
          <option value="" disabled selected>Select</option>
          <option value="doctor">Doctor</option>
          <option value="ophthalmologist">Ophthalmologist</option>
          <option value="nurse">Nurse</option>
          <option value="admin">Administrator</option>
          <option value="technician">Technician</option>
        </select>
        <svg class="select-arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg>
      </div>
    </div>

    <div class="form-group">
      <label>Hospital Name</label>
      <input type="text" [(ngModel)]="form.hospitalName" name="hospitalName" placeholder="Hospital Name" />
    </div>

    <div class="form-group">
      <label>Full Name</label>
      <input type="text" [(ngModel)]="form.fullName" name="fullName" placeholder="Name here" />
    </div>

    <div class="form-group">
      <label>Email Address</label>
      <input type="email" [(ngModel)]="form.email" name="email" placeholder="johndoe@example.com" />
    </div>

    <div class="form-group">
      <label>Create Password</label>
      <div class="input-icon-wrap">
        <input [type]="showPassword() ? 'text' : 'password'" [(ngModel)]="form.password" name="password" placeholder="at least 8 characters" />
        <button type="button" class="eye-btn" (click)="togglePassword()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            @if (showPassword()) {
              <path d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19m-6.72-1.07a3 3 0 11-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/>
            } @else {
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
            }
          </svg>
        </button>
      </div>
    </div>

    <div class="form-group">
      <label>Phone number</label>
      <div class="phone-wrap">
        <div class="phone-prefix">
          <span class="flag">🇵🇰</span>
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="12"><polyline points="6 9 12 15 18 9"/></svg>
        </div>
        <input type="tel" [(ngModel)]="form.phone" name="phone" placeholder="+92 00 000000" />
      </div>
    </div>

    <div class="form-check">
      <input type="checkbox" id="rememberMe" [(ngModel)]="rememberMe" name="rememberMe" />
      <label for="rememberMe">Remember Me</label>
    </div>

    <button type="submit" class="btn-submit" (click)="onSubmit()">Sign up</button>

    <p class="auth-switch">
      Already have an Account? <a routerLink="/login"><strong>Sign in here</strong></a>
    </p>

    <p class="auth-role-switch">
      Or Sign up as <a routerLink="/signup"><strong>Patient</strong></a> | <a routerLink="/login"><strong>Sign in</strong></a>
    </p>

  </form>
</div>
